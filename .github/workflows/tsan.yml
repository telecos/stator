name: ThreadSanitizer

on:
  pull_request:
    paths:
      - 'crates/stator_jse/src/gc/**'
      - '.github/workflows/tsan.yml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  tsan:
    name: TSAN (concurrent GC tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: "-Z sanitizer=thread"
      RUSTDOCFLAGS: "-Z sanitizer=thread"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-tsan-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tsan-registry-

      - name: Run TSAN tests – stator_jse
        env:
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/scripts/tsan.supp"
        run: >
          cargo +nightly test
          -p stator_jse
          -Z build-std
          --target x86_64-unknown-linux-gnu
