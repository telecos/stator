name: Benchmarks

on:
  push:
    branches:
      - main
      - fix/w13j
  workflow_dispatch:

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bench"

      - name: Build benchmarks
        run: cargo bench --package stator_jse --no-run --jobs 1 2>&1 | tail -50
        env:
          CARGO_INCREMENTAL: "0"

      - name: Run precompiled benchmarks (one-by-one to avoid OOM)
        run: |
          echo "=== System Resources ==="
          free -h
          echo ""
          echo "=== Running precompiled benchmarks ==="
          echo "Running each benchmark separately to stay within 7GB memory limit."
          echo ""
          passed=0
          failed=0
          for bench in fib_40_iterative_precompiled \
                       arithmetic_loop_10k_precompiled \
                       property_access_1k_precompiled \
                       object_creation_1k_precompiled \
                       array_push_sum_1k_precompiled \
                       closure_counter_1k_precompiled \
                       prototype_chain_1k_precompiled \
                       sieve_primes_1k_precompiled \
                       deep_object_access_1k_precompiled; do
            echo "--- $bench ---"
            if timeout 600 cargo bench --package stator_jse --bench precompiled_benchmarks -- "^${bench}$" 2>&1; then
              echo "OK: $bench"
              passed=$((passed + 1))
            else
              echo "SLOW or FAILED: $bench (skipping)"
              failed=$((failed + 1))
            fi
            echo ""
          done
          echo "=== Summary: $passed passed, $failed failed ==="
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
        env:
          MALLOC_ARENA_MAX: "2"
          RUST_BACKTRACE: "full"

      - name: Run V8-comparison benchmarks (one-by-one)
        run: |
          echo "=== Running V8-comparison benchmarks ==="
          for bench in fib_40_iterative \
                       arithmetic_loop_10k \
                       property_access_1k \
                       object_creation_1k \
                       array_push_sum_1k \
                       closure_counter_1k \
                       prototype_chain_1k \
                       deep_object_access_1k; do
            echo "--- $bench ---"
            timeout 600 cargo bench --package stator_jse --bench engine_benchmarks -- "^${bench}$" 2>&1 || echo "FAILED: $bench"
            echo ""
          done
        continue-on-error: true
        env:
          MALLOC_ARENA_MAX: "2"
          RUST_BACKTRACE: "full"

      - name: Run V8 (Node.js) comparison benchmarks
        run: |
          echo "=== V8 (Node.js) Reference Benchmarks ==="
          output=$(node benchmarks/v8_comparison/benchmarks.js)
          json_line=$(printf '%s\n' "$output" | grep '^V8_BENCHMARK_RESULTS_JSON=' || true)
          if [ -z "$json_line" ]; then
            printf '%s\n' "$output"
            echo "Failed to capture V8 benchmark JSON output" >&2
            exit 1
          fi
          printf '%s\n' "$output" | grep -v '^V8_BENCHMARK_RESULTS_JSON='
          echo
          echo "Captured JSON output:"
          echo "$json_line"
          printf '%s\n' "${json_line#V8_BENCHMARK_RESULTS_JSON=}" > v8.json
          echo
          echo "=== Parsed V8 Comparison Table ==="
          node - "$json_line" <<'NODE'
          const line = process.argv[2];
          const results = JSON.parse(line.replace(/^V8_BENCHMARK_RESULTS_JSON=/, ""));

          console.log("Benchmark".padEnd(30) + "Median (us)".padStart(15) + "Mean (us)".padStart(15) + "Min (us)".padStart(15));
          console.log("-".repeat(75));
          for (const result of results) {
            console.log(
              result.name.padEnd(30) +
              (result.median_ns / 1000).toFixed(1).padStart(15) +
              (result.mean_ns / 1000).toFixed(1).padStart(15) +
              (result.min_ns / 1000).toFixed(1).padStart(15)
            );
          }
          NODE

      - name: Display pre-compiled benchmark results
        run: |
          echo "=== Stator Pre-compiled Benchmarks ==="
          echo "These benchmarks skip parsing and compilation to measure pure"
          echo "warmed execution speed — a fairer comparison against V8's JIT output."
          echo
          python3 <<'PY'
          import json
          import pathlib
          import sys

          benches = [
              "fib_40_iterative_precompiled",
              "arithmetic_loop_10k_precompiled",
              "property_access_1k_precompiled",
              "object_creation_1k_precompiled",
              "array_push_sum_1k_precompiled",
              "closure_counter_1k_precompiled",
              "prototype_chain_1k_precompiled",
              "sieve_primes_1k_precompiled",
              "deep_object_access_1k_precompiled",
          ]

          rows = []
          missing = []
          for bench in benches:
              estimate_file = pathlib.Path("target") / "criterion" / bench / "new" / "estimates.json"
              if not estimate_file.exists():
                  missing.append(bench)
                  print(f"{bench:<40} (no results found)")
                  continue
              data = json.loads(estimate_file.read_text())
              median_ns = data["median"]["point_estimate"]
              name = bench.removesuffix("_precompiled")
              rows.append({
                  "name": name,
                  "benchmark": bench,
                  "median_ns": round(median_ns),
                  "iterations": None,
              })
              print(f"{bench:<40} {median_ns / 1000:12.1f} us (median)")

          pathlib.Path("stator_precompiled.json").write_text(json.dumps(rows, separators=(",", ":")))
          if missing:
              print(f"Missing precompiled benchmark results: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Build and run Stator FFI benchmarks (Chromium embedder path)
        run: |
          echo "=== Building stator_jse_ffi (release) ==="
          cargo build --package stator_jse_ffi --release
          echo ""
          echo "=== Building chromium_bench (C++ FFI benchmark harness) ==="
          cd examples/chromium_bench
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DSTATOR_LIB_DIR="$GITHUB_WORKSPACE/target/release"
          cmake --build build
          echo ""
          echo "=== Running Stator FFI Benchmarks ==="
          ffi_json="["
          first=1
          for bench in fib_40_iterative \
                       arithmetic_loop_10k \
                       property_access_1k \
                       object_creation_1k \
                       array_push_sum_1k \
                       closure_counter_1k \
                       prototype_chain_1k \
                       sieve_primes_1k \
                       deep_object_access_1k; do
            echo "--- $bench ---"
            output=$(timeout 120 ./build/chromium_bench --json --filter "$bench" 2>&1)
            printf '%s\n' "$output"
            json_line=$(printf '%s\n' "$output" | grep '^STATOR_FFI_BENCHMARK_RESULTS_JSON=' || true)
            if [ -z "$json_line" ]; then
              echo "Failed to capture Stator FFI benchmark JSON for $bench" >&2
              exit 1
            fi
            bench_item=$(node -e 'const rows = JSON.parse(process.argv[1]); process.stdout.write(JSON.stringify(rows[0]));' "${json_line#STATOR_FFI_BENCHMARK_RESULTS_JSON=}")
            if [ "$first" -eq 0 ]; then
              ffi_json="${ffi_json},"
            fi
            ffi_json="${ffi_json}${bench_item}"
            first=0
            echo ""
          done
          ffi_json="${ffi_json}]"
          printf '%s\n' "$ffi_json" > "$GITHUB_WORKSPACE/stator_ffi.json"

      - name: Gate V8 performance comparison
        run: |
          node benchmarks/v8_comparison/gate_results.mjs \
            --v8 v8.json \
            --precompiled stator_precompiled.json \
            --ffi stator_ffi.json
