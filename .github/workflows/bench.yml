name: Benchmarks

on:
  push:
    branches:
      - main
      - fix/w13j
  workflow_dispatch:

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bench"

      - name: Build benchmarks
        run: cargo bench --package stator_jse --no-run --jobs 1 2>&1 | tail -50
        env:
          CARGO_INCREMENTAL: "0"

      - name: Run precompiled benchmarks (one-by-one to avoid OOM)
        run: |
          echo "=== System Resources ==="
          free -h
          echo ""
          echo "=== Running precompiled benchmarks (interpreter-only) ==="
          echo "Running each benchmark separately to stay within 7GB memory limit."
          echo ""
          passed=0
          failed=0
          for bench in fib_40_iterative_precompiled \
                       arithmetic_loop_10k_precompiled \
                       property_access_1k_precompiled \
                       object_creation_1k_precompiled \
                       array_push_sum_1k_precompiled \
                       closure_counter_1k_precompiled \
                       prototype_chain_1k_precompiled \
                       sieve_primes_1k_precompiled \
                       deep_object_access_1k_precompiled; do
            echo "--- $bench ---"
            if timeout 60 cargo bench --package stator_jse --bench precompiled_benchmarks -- "^${bench}$" 2>&1; then
              echo "OK: $bench"
              passed=$((passed + 1))
            else
              echo "SLOW or FAILED: $bench (skipping)"
              failed=$((failed + 1))
            fi
            echo ""
          done
          echo "=== Summary: $passed passed, $failed failed ==="
        continue-on-error: true
        env:
          MALLOC_ARENA_MAX: "2"
          RUST_BACKTRACE: "full"

      - name: Run V8-comparison benchmarks (one-by-one)
        run: |
          echo "=== Running V8-comparison benchmarks ==="
          for bench in fib_40_iterative \
                       arithmetic_loop_10k \
                       property_access_1k \
                       object_creation_1k \
                       array_push_sum_1k \
                       closure_counter_1k \
                       prototype_chain_1k \
                       sieve_primes_1k \
                       deep_object_access_1k; do
            echo "--- $bench ---"
            timeout 60 cargo bench --package stator_jse --bench engine_benchmarks -- "^${bench}$" 2>&1 || echo "FAILED: $bench"
            echo ""
          done
        continue-on-error: true
        env:
          MALLOC_ARENA_MAX: "2"
          RUST_BACKTRACE: "full"

      - name: Run V8 (Node.js) comparison benchmarks
        run: |
          echo "=== V8 (Node.js) Reference Benchmarks ==="
          output=$(node benchmarks/v8_comparison/benchmarks.js)
          json_line=$(printf '%s\n' "$output" | grep '^V8_BENCHMARK_RESULTS_JSON=' || true)
          if [ -z "$json_line" ]; then
            printf '%s\n' "$output"
            echo "Failed to capture V8 benchmark JSON output" >&2
            exit 1
          fi
          printf '%s\n' "$output" | grep -v '^V8_BENCHMARK_RESULTS_JSON='
          echo
          echo "Captured JSON output:"
          echo "$json_line"
          echo
          echo "=== Parsed V8 Comparison Table ==="
          node - "$json_line" <<'NODE'
          const line = process.argv[2];
          const results = JSON.parse(line.replace(/^V8_BENCHMARK_RESULTS_JSON=/, ""));

          console.log("Benchmark".padEnd(30) + "Median (us)".padStart(15) + "Mean (us)".padStart(15) + "Min (us)".padStart(15));
          console.log("-".repeat(75));
          for (const result of results) {
            console.log(
              result.name.padEnd(30) +
              (result.median_ns / 1000).toFixed(1).padStart(15) +
              (result.mean_ns / 1000).toFixed(1).padStart(15) +
              (result.min_ns / 1000).toFixed(1).padStart(15)
            );
          }
          NODE

      - name: Display pre-compiled benchmark results
        run: |
          echo "=== Stator Pre-compiled Benchmarks (interpreter-only) ==="
          echo "These benchmarks skip parsing and compilation to measure pure"
          echo "interpreter speed — a fairer comparison against V8's JIT output."
          echo
          # Extract Criterion results for precompiled benchmarks
          for bench in fib_40_iterative_precompiled arithmetic_loop_10k_precompiled \
                       property_access_1k_precompiled object_creation_1k_precompiled \
                       array_push_sum_1k_precompiled closure_counter_1k_precompiled \
                       prototype_chain_1k_precompiled sieve_primes_1k_precompiled \
                       deep_object_access_1k_precompiled; do
            estimate_file="target/criterion/${bench}/new/estimates.json"
            if [ -f "$estimate_file" ]; then
              median_ns=$(python3 -c "import json; d=json.load(open('$estimate_file')); print(f\"{d['median']['point_estimate']/1000:.1f}\")")
              printf "%-40s %12s µs (median)\n" "$bench" "$median_ns"
            else
              printf "%-40s %s\n" "$bench" "(no results found)"
            fi
          done
