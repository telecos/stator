name: Test262 conformance gate

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'

# Cancel any in-progress run for the same branch/PR so that only the latest
# commit is tested, saving runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test262:
    name: Test262 conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout tc39/test262 (shallow)
        uses: actions/checkout@v4
        with:
          repository: tc39/test262
          path: test262
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test262"

      - name: Build stator_test262 (release)
        run: cargo build --package stator_test262 --release

      - name: Run Test262 suite
        # Threshold raised as engine conformance improves.
        # Current measured pass rate: ~14% (install_globals + native harness
        # + spec-compliant [[Construct]] + PlainObject constructor support).
        run: |
          ./target/release/stator_test262 \
            --test262-dir test262 \
            --threshold 10.0
