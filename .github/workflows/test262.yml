name: Test262 conformance gate

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR so that only the latest
# commit is tested, saving runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test262:
    name: Test262 conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout tc39/test262 (shallow)
        uses: actions/checkout@v4
        with:
          repository: tc39/test262
          path: test262
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test262"

      - name: Build stator_test262 (release)
        run: cargo build --package stator_test262 --release

      - name: Run Test262 suite
        # Stack strategy: set a SMALL main thread stack (4 MiB) so that
        # stacker::maybe_grow(8 MiB red_zone, 256 MiB segment) always triggers.
        # With remaining ~3-4 MiB < red_zone 8 MiB, stacker allocates a 256 MiB
        # heap-backed segment for each test.  Inside that segment,
        # MAX_CALL_STACK_DEPTH (128) limits JS recursion to ~128 frames.
        # This prevents:
        # - Main stack overflow (all heavy work on heap segments)
        # - Infinite JS recursion (bounded by call depth limit)
        # Memory: 5 GB vmem cap prevents OOM-killing the runner.
        run: |
          echo "Default stack limit: $(ulimit -s) KB"
          ulimit -s 4096     # 4 MB — forces stacker::maybe_grow to allocate heap segments
          ulimit -v 5242880  # 5 GB virtual memory cap
          echo "Active stack limit: $(ulimit -s) KB"
          set +e
          ./target/release/stator_test262 \
            --test262-dir test262 \
            --threshold 25.0
          rc=$?
          if [ $rc -eq 134 ] || [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
            echo "::warning::Test262 runner crashed (exit $rc) — stack overflow or OOM"
            exit 0
          fi
          exit $rc
