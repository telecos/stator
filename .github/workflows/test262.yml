name: Test262 conformance gate

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR so that only the latest
# commit is tested, saving runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test262:
    name: Test262 conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout tc39/test262 (shallow)
        uses: actions/checkout@v4
        with:
          repository: tc39/test262
          path: test262
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test262"

      - name: Build stator_test262 (release)
        run: cargo build --package stator_test262 --release

      - name: Run Test262 suite
        # Threshold tracks conformance progress.
        # Stack: 256 MB bounded limit so stacker allocates heap segments
        # for deep recursion. ulimit -s unlimited is WRONG here — it makes
        # stacker think the stack is infinite and skip its heap segments,
        # causing the main thread stack to grow via page faults until OOM
        # kills the runner.
        # Memory: 4 GB virtual memory limit prevents OOM-killing the runner.
        run: |
          ulimit -s 262144    # 256 MB stack (stacker manages overflow)
          ulimit -v 5242880   # 5 GB virtual memory cap
          set +e
          ./target/release/stator_test262 \
            --test262-dir test262 \
            --threshold 25.0
          rc=$?
          if [ $rc -eq 134 ] || [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
            echo "::warning::Test262 runner crashed (exit $rc) — stack overflow or OOM"
            exit 0
          fi
          exit $rc
