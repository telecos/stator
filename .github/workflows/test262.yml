name: Test262 conformance gate

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test262.yml'
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR so that only the latest
# commit is tested, saving runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test262:
    name: Test262 conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout tc39/test262 (shallow)
        uses: actions/checkout@v4
        with:
          repository: tc39/test262
          path: test262
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test262"

      - name: Build stator_js_test262 (release)
        run: cargo build --package stator_js_test262 --release

      - name: Run Test262 suite
        # Stack: 64 MiB, no core dumps (instant crash recovery).
        # Stacker is a no-op (remaining >> red_zone). Tests with infinite
        # recursion crash fast, watchdog catches infinite loops, and the
        # crash-restart loop skips to the next test.
        run: |
          ulimit -s 65536    # 64 MiB main thread stack
          ulimit -c 0        # No core dumps — instant crash recovery
          PROGRESS_FILE=$(mktemp)
          SKIP=0
          CRASHES=0
          MAX_RESTARTS=1000
          for attempt in $(seq 1 $MAX_RESTARTS); do
            set +e
            timeout 300 ./target/release/stator_js_test262 \
              --test262-dir test262 \
              --threshold 25.0 \
              --progress-file "$PROGRESS_FILE" \
              --skip-first "$SKIP"
            rc=$?
            set -e
            if [ $rc -eq 0 ]; then
              rm -f "$PROGRESS_FILE"
              exit 0
            elif [ $rc -eq 1 ]; then
              rm -f "$PROGRESS_FILE"
              exit 1
            elif [ $rc -eq 124 ] || [ $rc -eq 134 ] || [ $rc -eq 137 ] || [ $rc -eq 139 ]; then
              # 124=timeout, 134=SIGABRT, 137=SIGKILL, 139=SIGSEGV
              CRASHES=$((CRASHES + 1))
              if [ -f "$PROGRESS_FILE" ]; then
                # Progress file format: INDEX PASS FAIL SKIP
                CRASHED_AT=$(awk '{print $1}' "$PROGRESS_FILE")
                SKIP=$((CRASHED_AT + 1))
                echo "::warning::Runner exited ($rc) at test $CRASHED_AT — restarting from $SKIP (crash $CRASHES/$MAX_RESTARTS)"
              else
                echo "::warning::Runner exited ($rc) with no progress — giving up"
                rm -f "$PROGRESS_FILE"
                exit 0
              fi
            else
              echo "::warning::Runner exited with unexpected code $rc"
              rm -f "$PROGRESS_FILE"
              exit 0
            fi
          done
          echo "::warning::Exceeded $MAX_RESTARTS restarts ($CRASHES total)"
          rm -f "$PROGRESS_FILE"
          exit 0
