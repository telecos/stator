name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Run tests (debug)
        run: cargo test --workspace

      - name: Run tests (release)
        run: cargo test --workspace --release

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  diff_test:
    name: Differential testing (st8 vs d8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "diff-test"

      - name: Build st8
        run: cargo build --package st8

      - name: Run differential tests on corpus (PR subset)
        run: |
          bash scripts/diff_test.sh --corpus tests/diff_corpus \
            --st8 target/debug/st8

  mini_browser:
    name: mini_browser output
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mini-browser"

      - name: Build stator_ffi (release)
        run: cargo build --package stator_ffi --release

      - name: Build mini_browser
        run: |
          mkdir -p examples/mini_browser/build
          cd examples/mini_browser/build
          cmake ..
          make

      - name: Verify mini_browser output
        run: |
          actual=$(examples/mini_browser/build/mini_browser)

          # Helper: fail if a string is not present in the output.
          check_contains() {
            if ! printf '%s' "$actual" | grep -qF "$1"; then
              printf 'Missing expected output: %s\n' "$1"
              printf 'Actual output:\n%s\n' "$actual"
              exit 1
            fi
          }

          # ── Phase 1: GC / object model ──────────────────────────────────
          check_contains '[tab] created context'
          check_contains '[tab] allocated: number(42), string("hello"), object{x: 1, y: 2}'
          check_contains '[tab] GC: 3 objects survived (held by handles)'
          check_contains '[tab] released handles, GC: 0 objects (all reclaimed)'
          check_contains '[tab] heap: 0 bytes used / 8388608 bytes capacity'

          # ── Phase 2: JavaScript parsing + bytecode compilation ──────────
          check_contains '[tab] --- Phase 2: JavaScript parsing demo ---'
          check_contains '[tab] compiling: var x = 1 + 2;'
          check_contains '[tab] OK -- 6 bytecode(s) generated'
          check_contains '  LdaSmi 2'
          check_contains '  Star r1'
          check_contains '  LdaSmi 1'
          check_contains '  Add r1, slot(0)'
          check_contains '  Star r0'
          check_contains '  Return'
          check_contains '[tab] ERROR: SyntaxError: at 1:5'

          # LdaUndefined must NOT appear in the bytecode dump for a top-level
          # program (programs now return their completion value directly).
          if printf '%s' "$actual" | grep -qF 'LdaUndefined'; then
            printf 'Unexpected LdaUndefined in bytecode dump\n'
            printf 'Actual output:\n%s\n' "$actual"
            exit 1
          fi

          # ── Phase 3: JavaScript execution ───────────────────────────────
          check_contains '[tab] --- Phase 3: JavaScript execution demo ---'
          check_contains '[tab] registered native console.log'
          check_contains "page A loaded"
          check_contains "x = 3"
          # Fibonacci and factorial results (timing varies so we match prefix only)
          check_contains '[tab] result: 55'
          check_contains '[tab] result: 3628800'
          # try/catch demo
          check_contains '[tab] result: false'
          # Uncaught exception demo
          check_contains '[tab] UNCAUGHT: (exception)'

          # ── Phase 4: v8-compatible API demo ─────────────────────────────
          check_contains '[tab] using v8-compatible API'
          check_contains '[tab] created v8::Isolate, v8::Context'
          check_contains '[tab] registered document.getElementById'
          check_contains '[tab] executing: var el = document.getElementById'
          check_contains "[tab] DOM update: #title.textContent = 'Hello!'"
