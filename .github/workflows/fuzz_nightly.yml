name: Nightly Fuzz

on:
  schedule:
    # Run at 02:00 UTC every night.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-nightly:
    name: Nightly fuzz ${{ matrix.target }} (10 min)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_tagged_value
          - fuzz_heap_alloc
          - fuzz_handle_scope
          - fuzz_gc_stress
          - fuzz_property_ops
          - fuzz_scanner
          - fuzz_parser
          - fuzz_parser_utf8
          - fuzz_bytecode_compiler
          - fuzz_bytecode_roundtrip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fuzz"
          workspaces: "fuzz -> target"

      - name: Cache cargo-fuzz binary
        id: cache-cargo-fuzz
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Install cargo-fuzz
        if: steps.cache-cargo-fuzz.outputs.cache-hit != 'true'
        run: cargo install cargo-fuzz

      - name: Build fuzz target
        run: cargo +nightly fuzz build ${{ matrix.target }}

      - name: Run ${{ matrix.target }} (10 min)
        run: >
          cargo +nightly fuzz run ${{ matrix.target }}
          fuzz/corpus/${{ matrix.target }}
          -- -max_total_time=600

      - name: Archive corpus for ${{ matrix.target }}
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          path: fuzz/corpus/${{ matrix.target }}/
          retention-days: 90
