name: Miri

on:
  pull_request:
    paths:
      - 'crates/stator_jse/src/gc/**'
      - 'crates/stator_jse/src/objects/**'
      - 'crates/stator_jse/src/bytecode/**'
      - '.github/workflows/miri.yml'
      - 'crates/stator_jse/Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  miri:
    name: Miri (${{ matrix.target }}, ${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary target – x86-64 Linux (Stacked Borrows)
          # Skips bytecode_generator (100× overhead per test) and objects::regexp
          # (0 unsafe, 123 tests, 1.5 min) to keep within the 60-minute limit.
          - target: x86_64-unknown-linux-gnu
            miriflags: "-Zmiri-preemption-rate=0.1"
            label: "Stacked Borrows"
            test_filter: >-
              gc:: objects:: bytecode::
              --skip bytecode_generator
              --skip objects::regexp
          # Primary target – x86-64 Linux (Tree Borrows)
          # Only runs the raw-pointer GC submodules because Tree Borrows validates
          # pointer aliasing rules which only matter for the unsafe GC code.
          # The full gc:: suite (~108 tests) times out at ~55 min under Tree
          # Borrows (~12× SB overhead); restricting to gc_ptr/handle/tlab keeps
          # it under 15 minutes while still covering all unsafe raw-pointer code.
          - target: x86_64-unknown-linux-gnu
            miriflags: "-Zmiri-tree-borrows -Zmiri-preemption-rate=0.1"
            label: "Tree Borrows"
            test_filter: >-
              gc::gc_ptr::
              gc::handle::
              gc::tlab::
          # 32-bit target – only pointer-size-critical modules.
          # Miri on i686 runs GC algorithm tests at ~15 s/test (vs ~6 s on x86_64),
          # so the full gc:: suite would exceed the timeout. We keep only the tests
          # that directly exercise 32-bit pointer representation: gc_ptr, handle,
          # tlab, and the NaN-boxing / tagged-pointer objects modules.
          - target: i686-unknown-linux-gnu
            miriflags: "-Zmiri-preemption-rate=0.1"
            label: "Stacked Borrows"
            packages: "gcc-multilib"
            test_filter: >-
              gc::gc_ptr::
              gc::handle::
              gc::tlab::
              objects::nanbox::
              objects::nan_boxing::
              objects::tagged::
          # AArch64 target – exercise GC + objects on a second architecture.
          # Skips bytecode:: (safe Rust, already covered by x86_64 SB) and
          # objects::regexp (no unsafe code, 123 tests, adds ~4 min under QEMU)
          # to keep the cross-compiled job well within the 60-minute limit.
          - target: aarch64-unknown-linux-gnu
            miriflags: "-Zmiri-preemption-rate=0.1"
            label: "Stacked Borrows"
            packages: "gcc-aarch64-linux-gnu libc6-dev-arm64-cross"
            test_filter: >-
              gc:: objects::
              --skip objects::regexp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cross-compilation toolchain
        if: ${{ matrix.packages != '' && matrix.packages != null }}
        run: sudo apt-get update -q && sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust nightly with Miri
        id: toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-miri-${{ matrix.target }}-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-${{ matrix.target }}-registry-

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-miri-${{ matrix.target }}-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-${{ matrix.target }}-git-

      - name: Cache Miri build artifacts
        uses: actions/cache@v5
        with:
          path: target/miri
          key: ${{ runner.os }}-miri-target-${{ matrix.target }}-${{ steps.toolchain.outputs.rustc-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-target-${{ matrix.target }}-${{ steps.toolchain.outputs.rustc-version }}-
            ${{ runner.os }}-miri-target-${{ matrix.target }}-

      - name: Set up Miri sysroot
        run: cargo +nightly miri setup --target ${{ matrix.target }}

      - name: Run Miri tests
        env:
          MIRIFLAGS: "${{ matrix.miriflags }}"
        run: |
          cargo +nightly miri test -p stator_jse --target ${{ matrix.target }} -- ${{ matrix.test_filter }}
