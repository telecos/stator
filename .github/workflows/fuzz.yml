name: Fuzz Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  fuzz-smoke:
    name: Fuzz smoke tests (10 s each)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fuzz"
          workspaces: "fuzz -> target"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

      - name: Smoke-test fuzz_tagged_value
        run: >
          cargo +nightly fuzz run fuzz_tagged_value
          fuzz/corpus/fuzz_tagged_value
          -- -max_total_time=10

      - name: Smoke-test fuzz_heap_alloc
        run: >
          cargo +nightly fuzz run fuzz_heap_alloc
          fuzz/corpus/fuzz_heap_alloc
          -- -max_total_time=10

      - name: Smoke-test fuzz_handle_scope
        run: >
          cargo +nightly fuzz run fuzz_handle_scope
          fuzz/corpus/fuzz_handle_scope
          -- -max_total_time=10

      - name: Smoke-test fuzz_gc_stress
        run: >
          cargo +nightly fuzz run fuzz_gc_stress
          fuzz/corpus/fuzz_gc_stress
          -- -max_total_time=10

      - name: Smoke-test fuzz_property_ops
        run: >
          cargo +nightly fuzz run fuzz_property_ops
          fuzz/corpus/fuzz_property_ops
          -- -max_total_time=10

      - name: Smoke-test fuzz_scanner
        run: >
          cargo +nightly fuzz run fuzz_scanner
          fuzz/corpus/fuzz_scanner
          -- -max_total_time=10

      - name: Smoke-test fuzz_parser
        run: >
          cargo +nightly fuzz run fuzz_parser
          fuzz/corpus/fuzz_parser
          -- -max_total_time=10

      - name: Smoke-test fuzz_parser_utf8
        run: >
          cargo +nightly fuzz run fuzz_parser_utf8
          fuzz/corpus/fuzz_parser_utf8
          -- -max_total_time=10

      - name: Smoke-test fuzz_bytecode_compiler
        run: >
          cargo +nightly fuzz run fuzz_bytecode_compiler
          fuzz/corpus/fuzz_bytecode_compiler
          -- -max_total_time=10

      - name: Smoke-test fuzz_bytecode_roundtrip
        run: >
          cargo +nightly fuzz run fuzz_bytecode_roundtrip
          fuzz/corpus/fuzz_bytecode_roundtrip
          -- -max_total_time=10
