name: Fuzz Smoke Tests

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'fuzz/**'
      - 'Cargo.lock'
      - '.github/workflows/fuzz.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'fuzz/**'
      - 'Cargo.lock'
      - '.github/workflows/fuzz.yml'

# Cancel any in-progress run for the same branch/PR so that only the latest
# commit is tested, saving runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-smoke:
    name: Smoke-test ${{ matrix.target }} (10 s)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_tagged_value
          - fuzz_heap_alloc
          - fuzz_handle_scope
          - fuzz_gc_stress
          - fuzz_property_ops
          - fuzz_scanner
          - fuzz_parser
          - fuzz_parser_utf8
          - fuzz_bytecode_compiler
          - fuzz_bytecode_roundtrip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fuzz"
          workspaces: "fuzz -> target"

      - name: Cache cargo-fuzz binary
        id: cache-cargo-fuzz
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-

      - name: Install cargo-fuzz
        run: command -v cargo-fuzz || cargo install cargo-fuzz

      - name: Build fuzz target
        run: cargo +nightly fuzz build ${{ matrix.target }}

      - name: Smoke-test ${{ matrix.target }}
        run: >
          cargo +nightly fuzz run ${{ matrix.target }}
          fuzz/corpus/${{ matrix.target }}
          -- -max_total_time=10
