name: Fuzz Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  fuzz-smoke:
    name: Smoke-test ${{ matrix.target }} (10 s)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_tagged_value
          - fuzz_heap_alloc
          - fuzz_handle_scope
          - fuzz_gc_stress
          - fuzz_property_ops
          - fuzz_scanner
          - fuzz_parser
          - fuzz_parser_utf8
          - fuzz_bytecode_compiler
          - fuzz_bytecode_roundtrip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fuzz-${{ matrix.target }}"
          workspaces: "fuzz -> target"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build fuzz target
        run: cargo +nightly fuzz build ${{ matrix.target }}

      - name: Smoke-test ${{ matrix.target }}
        run: >
          cargo +nightly fuzz run ${{ matrix.target }}
          fuzz/corpus/${{ matrix.target }}
          -- -max_total_time=10
