name: AddressSanitizer

on:
  pull_request:
    paths:
      - 'crates/stator_ffi/src/**'
      - 'crates/stator_jse/src/**'
      - '.github/workflows/asan.yml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  asan:
    name: ASAN (FFI boundary tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: "-Z sanitizer=address"
      RUSTDOCFLAGS: "-Z sanitizer=address"
      # Disable LSAN leak detection: Rc<RefCell> prototype chains form
      # reference cycles (e.g. Ctor → Ctor.prototype → constructor → Ctor)
      # that LSAN reports as leaks.  ASAN memory-corruption checks
      # (use-after-free, buffer overflow, etc.) remain fully enabled.
      # Tracked: re-enable once the engine moves to a tracing GC.
      LSAN_OPTIONS: "detect_leaks=0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-asan-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-asan-registry-

      - name: Run ASAN tests – stator_jse_ffi
        run: >
          cargo +nightly test
          -p stator_jse_ffi
          -Z build-std
          --target x86_64-unknown-linux-gnu
