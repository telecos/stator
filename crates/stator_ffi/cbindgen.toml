# cbindgen.toml — C header generation config for stator_js_ffi.
#
# Run `cargo build -p stator_js_ffi` to regenerate `include/stator.h`.
# The generated file is committed to the repository so that embedders can
# consume it without needing a Rust toolchain installed.

language = "C"

# Use the classic #ifndef include guard rather than `#pragma once` so the
# header is valid on every C89/C99/C11 compiler.
include_guard = "STATOR_H"
pragma_once = false

# cbindgen prepends this comment to every generated file.
autogen_warning = "/* THIS FILE WAS GENERATED BY cbindgen — DO NOT EDIT MANUALLY.\n * Re-run `cargo build -p stator_js_ffi` to regenerate.\n */"

# Translate `usize` / `isize` to `size_t` / `ptrdiff_t` so the header is
# correct on 32-bit and 64-bit targets alike.
usize_is_size_t = true

# Wrap all declarations in `extern "C" { … }` when the header is compiled
# as C++, making it safe to include from C++ translation units.
cpp_compat = true

# Only export symbols that begin with `stator_` (functions) or `Stator`
# (types).  This prevents accidental leakage of internal helpers if any are
# ever added.
[export]
include = [
    "StatorIsolate",
    "StatorContext",
    "StatorValue",
    "StatorObject",
    "StatorScript",
    "StatorPlatformVTable",
    "StatorPlatform",
    "stator_isolate_create",
    "stator_isolate_destroy",
    "stator_isolate_gc",
    "stator_gc_collect",
    "stator_live_object_count",
    "stator_heap_used",
    "stator_heap_capacity",
    "stator_context_new",
    "stator_context_destroy",
    "stator_value_new_number",
    "stator_value_new_string",
    "stator_value_destroy",
    "stator_value_type",
    "stator_value_as_number",
    "stator_value_as_string",
    "stator_object_new",
    "stator_object_destroy",
    "stator_object_set",
    "stator_object_get",
    "stator_script_compile",
    "stator_script_get_error",
    "stator_bytecode_dump",
    "stator_script_bytecode_count",
    "stator_script_free",
    "stator_platform_new",
    "stator_platform_destroy",
    "stator_platform_number_of_worker_threads",
    "stator_platform_post_task",
    "stator_platform_monotonically_increasing_time",
    "stator_platform_current_clock_time_millis",
    "StatorObjectTemplate",
    "stator_object_template_new",
    "stator_object_template_destroy",
    "stator_object_template_set",
    "stator_object_template_set_internal_field_count",
    "stator_object_template_internal_field_count",
    "stator_object_template_new_instance",
    "StatorTryCatch",
    "stator_try_catch_new",
    "stator_try_catch_has_caught",
    "stator_try_catch_exception",
    "stator_try_catch_reset",
    "stator_try_catch_destroy",
    "stator_isolate_has_pending_exception",
    "stator_isolate_clear_pending_exception",
]
