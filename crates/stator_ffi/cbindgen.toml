# cbindgen.toml — C header generation config for stator_jse_ffi.
#
# Run `cargo build -p stator_jse_ffi` to regenerate `include/stator.h`.
# The generated file is committed to the repository so that embedders can
# consume it without needing a Rust toolchain installed.

language = "C"

# Use the classic #ifndef include guard rather than `#pragma once` so the
# header is valid on every C89/C99/C11 compiler.
include_guard = "STATOR_H"
pragma_once = false

# cbindgen prepends this comment to every generated file.
autogen_warning = "/* THIS FILE WAS GENERATED BY cbindgen — DO NOT EDIT MANUALLY.\n * Re-run `cargo build -p stator_jse_ffi` to regenerate.\n */"

# Translate `usize` / `isize` to `size_t` / `ptrdiff_t` so the header is
# correct on 32-bit and 64-bit targets alike.
usize_is_size_t = true

# Wrap all declarations in `extern "C" { … }` when the header is compiled
# as C++, making it safe to include from C++ translation units.
cpp_compat = true

# Only export symbols that begin with `stator_` (functions) or `Stator`
# (types).  This prevents accidental leakage of internal helpers if any are
# ever added.
